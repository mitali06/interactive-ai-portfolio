<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Analysis Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f9fa;
      --color-background-tertiary: #f1f3f5;
      --color-text-primary: #212529;
      --color-text-secondary: #6c757d;
      --color-text-tertiary: #adb5bd;
      --color-border-tertiary: rgba(0, 0, 0, 0.1);
      --color-border-secondary: rgba(0, 0, 0, 0.2);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #252525;
        --color-background-tertiary: #2d2d2d;
        --color-text-primary: #e0e0e0;
        --color-text-secondary: #a0a0a0;
        --color-text-tertiary: #707070;
        --color-border-tertiary: rgba(255, 255, 255, 0.1);
        --color-border-secondary: rgba(255, 255, 255, 0.2);
      }
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      font-size: 15px;
      color: var(--color-text-secondary);
    }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border-tertiary);
      overflow-x: auto;
    }
    
    .tab-btn {
      padding: 1rem 1.25rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      color: var(--color-text-primary);
    }
    
    .tab-btn.active {
      color: var(--color-text-primary);
      border-bottom-color: var(--color-text-primary);
    }
    
    .tool-section {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 2rem;
      display: none;
    }
    
    .tool-section.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--color-text-primary);
    }
    
    textarea, input[type="text"], input[type="url"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-family: var(--font-sans);
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
    }
    
    textarea:focus, input:focus {
      outline: none;
      border-color: var(--color-text-primary);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }
    
    .btn-submit {
      background: var(--color-background-secondary);
      border: 1px solid var(--color-border-secondary);
      padding: 0.75rem 1.5rem;
      border-radius: var(--border-radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--color-text-primary);
      transition: all 0.2s;
    }
    
    .btn-submit:hover {
      background: var(--color-background-tertiary);
      border-color: var(--color-border-secondary);
    }
    
    .btn-submit:active {
      transform: scale(0.98);
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--color-text-secondary);
      font-size: 14px;
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-border-tertiary);
      border-top-color: var(--color-text-primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: -2px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .result {
      background: var(--color-background-secondary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 1.5rem;
      margin-top: 2rem;
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .result-title {
      font-weight: 500;
      font-size: 15px;
      margin-bottom: 1rem;
      color: var(--color-text-primary);
    }
    
    .error {
      background: #ffe6e6;
      color: #c41e3a;
      padding: 1rem;
      border-radius: var(--border-radius-md);
      margin-top: 1rem;
      font-size: 14px;
      border: 1px solid #ffcccc;
    }
    
    .success-banner {
      background: #e6ffe6;
      color: #0b6623;
      padding: 1rem;
      border-radius: var(--border-radius-md);
      margin-bottom: 2rem;
      font-size: 14px;
      border: 1px solid #ccffcc;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI Analysis Portfolio</h1>
      <p>Interactive demos of AI-powered insights and analysis capabilities</p>
    </div>
    
    <div class="success-banner" style="display: none;" id="successBanner">
      ✅ Connected to Claude API! Your portfolio is ready to use.
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('sentiment')">
        <i class="ti ti-bulb" style="margin-right: 6px;"></i>Sentiment Analyzer
      </button>
      <button class="tab-btn" onclick="switchTab('research')">
        <i class="ti ti-search" style="margin-right: 6px;"></i>Research Assistant
      </button>
      <button class="tab-btn" onclick="switchTab('summarize')">
        <i class="ti ti-file-text" style="margin-right: 6px;"></i>Content Summarizer
      </button>
      <button class="tab-btn" onclick="switchTab('insights')">
        <i class="ti ti-chart-bar" style="margin-right: 6px;"></i>Data Insights
      </button>
    </div>
    
    <!-- Sentiment Analyzer -->
    <div id="sentiment" class="tool-section active">
      <div class="form-group">
        <label>Analyze text for tone, sentiment, and key themes</label>
        <textarea id="sentiment-input" placeholder="Paste your text here... (email, review, feedback, etc.)"></textarea>
      </div>
      <button class="btn-submit" onclick="analyzeSentiment()">Analyze Now</button>
      <div id="sentiment-result"></div>
    </div>
    
    <!-- Research Assistant -->
    <div id="research" class="tool-section">
      <div class="form-group">
        <label>Ask any research question</label>
        <textarea id="research-input" placeholder="What would you like to research? (e.g., 'Latest trends in AI ethics in 2026')"></textarea>
      </div>
      <button class="btn-submit" onclick="performResearch()">Research</button>
      <div id="research-result"></div>
    </div>
    
    <!-- Content Summarizer -->
    <div id="summarize" class="tool-section">
      <div class="form-group">
        <label>Summarize and break down content</label>
        <textarea id="summarize-input" placeholder="Paste article, report, or any content here..."></textarea>
      </div>
      <button class="btn-submit" onclick="summarizeContent()">Summarize</button>
      <div id="summarize-result"></div>
    </div>
    
    <!-- Data Insights -->
    <div id="insights" class="tool-section">
      <div class="form-group">
        <label>Share data and get AI-powered insights</label>
        <textarea id="insights-input" placeholder="Paste data, lists, metrics, or numbers here..."></textarea>
      </div>
      <button class="btn-submit" onclick="generateInsights()">Generate Insights</button>
      <div id="insights-result"></div>
    </div>
  </div>

  <script>
    // Check if API is working on load
    window.addEventListener('load', function() {
      checkApiConnection();
    });
    
    async function checkApiConnection() {
      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'test', prompt: 'test' })
        });
        
        if (response.ok) {
          document.getElementById('successBanner').style.display = 'block';
        }
      } catch (e) {
        // Silent fail - API might not be set up yet
      }
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tool-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.closest('.tab-btn').classList.add('active');
    }
    
    async function callBackendAPI(action, prompt) {
      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, prompt })
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'API call failed');
        }
        
        const data = await response.json();
        return data.result;
      } catch (error) {
        throw error;
      }
    }
    
    async function analyzeSentiment() {
      const input = document.getElementById('sentiment-input').value;
      const resultDiv = document.getElementById('sentiment-result');
      
      if (!input.trim()) {
        resultDiv.innerHTML = '<div class="error">Please enter some text to analyze</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Analyzing sentiment...</div>';
      
      try {
        const prompt = `Analyze the following text for sentiment, tone, and key themes. Provide a brief summary (2-3 sentences), then list: 1) Overall sentiment (positive/negative/neutral), 2) Tone (professional/casual/angry/etc.), 3) Key themes or topics. Keep it concise and actionable.\n\nText: "${input}"`;
        
        const result = await callBackendAPI('sentiment', prompt);
        resultDiv.innerHTML = `<div class="result"><div class="result-title">Analysis Result</div>${escapeHtml(result)}</div>`;
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    async function performResearch() {
      const input = document.getElementById('research-input').value;
      const resultDiv = document.getElementById('research-result');
      
      if (!input.trim()) {
        resultDiv.innerHTML = '<div class="error">Please enter a research question</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Researching...</div>';
      
      try {
        const prompt = `Provide a comprehensive but concise research response to: "${input}"\n\nStructure your answer with:\n1. Quick answer (1-2 sentences)\n2. Key points (3-5 bullet points with details)\n3. One actionable takeaway or recommendation\n\nKeep it clear and well-organized.`;
        
        const result = await callBackendAPI('research', prompt);
        resultDiv.innerHTML = `<div class="result"><div class="result-title">Research Findings</div>${escapeHtml(result)}</div>`;
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    async function summarizeContent() {
      const input = document.getElementById('summarize-input').value;
      const resultDiv = document.getElementById('summarize-result');
      
      if (!input.trim()) {
        resultDiv.innerHTML = '<div class="error">Please paste content to summarize</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Summarizing...</div>';
      
      try {
        const prompt = `Summarize the following content and break it down into key sections:\n\n${input}\n\nProvide:\n1. Executive summary (2-3 sentences)\n2. Main points (numbered list, 5-7 items)\n3. Key takeaways (3 bullets)\n\nBe clear and concise.`;
        
        const result = await callBackendAPI('summarize', prompt);
        resultDiv.innerHTML = `<div class="result"><div class="result-title">Content Summary</div>${escapeHtml(result)}</div>`;
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    async function generateInsights() {
      const input = document.getElementById('insights-input').value;
      const resultDiv = document.getElementById('insights-result');
      
      if (!input.trim()) {
        resultDiv.innerHTML = '<div class="error">Please share some data to analyze</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Generating insights...</div>';
      
      try {
        const prompt = `Analyze the following data and provide AI-powered insights:\n\n${input}\n\nProvide:\n1. Data overview (what this data represents)\n2. Key patterns or trends\n3. Notable findings (3-5 insights)\n4. Recommendations or next steps\n\nBe analytical and specific.`;
        
        const result = await callBackendAPI('insights', prompt);
        resultDiv.innerHTML = `<div class="result"><div class="result-title">Data Insights</div>${escapeHtml(result)}</div>`;
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    function escapeHtml(text) {
      const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
